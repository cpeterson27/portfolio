    </linearGradient>
    <linearGradient id="border" x1="96" y1="88" x2="416" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#F97316"/>
