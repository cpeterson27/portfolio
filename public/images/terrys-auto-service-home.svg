<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Terry's Auto Service homepage</title>
  <desc id="desc">Homepage preview with dark auto service hero, red accents, services, gallery, and contact areas.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050914"/><stop offset="1" stop-color="#151b28"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".2"/></filter>
  </defs>
  <rect width="1200" height="780" fill="#f5f6f8"/>
  <rect width="1200" height="72" fill="#050914"/>
  <text x="90" y="46" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="900">TERRY'S <tspan fill="#ef4444">AUTO</tspan> SERVICE</text>
  <g fill="#e5e7eb" font-family="Arial,sans-serif" font-size="16" font-weight="800"><text x="560" y="43">DASHBOARD</text><text x="690" y="43">INVOICES</text><text x="800" y="43">EXPENSES</text><text x="930" y="43">GALLERY</text></g>
  <rect y="72" width="1200" height="430" fill="url(#hero)"/>
  <rect y="496" width="1200" height="7" fill="#c81e1e"/>
  <g transform="translate(92 162)">
    <rect width="232" height="42" fill="#2b313c"/><rect width="5" height="42" fill="#ef4444"/>
    <text x="22" y="28" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="900">INDEPENDENT AUTO MECHANIC</text>
    <text x="0" y="126" fill="#fff" font-family="Arial,sans-serif" font-size="60" font-weight="900">HONEST REPAIR WORK</text>
    <text x="0" y="194" fill="#fff" font-family="Arial,sans-serif" font-size="60" font-weight="900">FOR EVERYDAY DRIVERS</text>
    <text x="0" y="244" fill="#d1d5db" font-family="Arial,sans-serif" font-size="22" font-weight="700">Appointment-based repair and maintenance with straight answers.</text>
    <rect x="0" y="296" width="230" height="58" rx="7" fill="#c81e1e"/><text x="32" y="333" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="900">GO TO DASHBOARD</text>
  </g>
  <g transform="translate(720 128)" filter="url(#shadow)">
    <rect width="330" height="386" rx="8" fill="#fff"/>
    <text x="32" y="90" fill="#050914" font-family="Arial,sans-serif" font-size="36" font-weight="900">WHAT TO EXPECT</text>
    <text x="32" y="132" fill="#475569" font-family="Arial,sans-serif" font-size="19">Clear explanations before work begins.</text>
    <g fill="#f8fafc" stroke="#d7dce4"><rect x="32" y="174" width="266" height="58" rx="6"/><rect x="32" y="250" width="266" height="58" rx="6"/><rect x="32" y="326" width="266" height="58" rx="6"/></g>
    <g fill="#111827" font-family="Arial,sans-serif" font-size="18" font-weight="900"><text x="74" y="210">Straight answers</text><text x="74" y="286">Practical repairs</text><text x="74" y="362">Appointment based</text></g>
    <g stroke="#dc2626" stroke-width="4" fill="none"><circle cx="52" cy="204" r="10"/><path d="M47 203l4 5 9-12"/><circle cx="52" cy="280" r="10"/><path d="M47 279l4 5 9-12"/><circle cx="52" cy="356" r="10"/><path d="M47 355l4 5 9-12"/></g>
  </g>
  <text x="92" y="578" fill="#c81e1e" font-family="Arial,sans-serif" font-size="16" font-weight="900">SERVICES</text>
  <text x="92" y="632" fill="#050914" font-family="Arial,sans-serif" font-size="42" font-weight="900">REPAIR AND MAINTENANCE TERRY CAN REVIEW WITH YOU</text>
  <g transform="translate(92 680)" fill="#fff" stroke="#d7dce4"><rect width="170" height="58" rx="7"/><rect x="190" width="170" height="58" rx="7"/><rect x="380" width="170" height="58" rx="7"/><rect x="570" width="170" height="58" rx="7"/></g>
</svg>
