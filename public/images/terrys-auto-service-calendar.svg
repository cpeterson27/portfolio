      <g fill="#f8fafc" stroke="#d7dce4"><rect width="640" height="34"/></g>
      <g fill="#64748b" font-family="Arial,sans-serif" font-size="14" font-weight="900"><text x="38" y="23">SUN</text><text x="128" y="23">MON</text><text x="218" y="23">TUE</text><text x="308" y="23">WED</text><text x="398" y="23">THU</text><text x="488" y="23">FRI</text><text x="578" y="23">SAT</text></g>
      <g stroke="#d7dce4"><path d="M91 34v396M182 34v396M273 34v396M364 34v396M455 34v396M546 34v396"/><path d="M0 100h640M0 166h640M0 232h640M0 298h640M0 364h640"/></g>
      <g fill="#0f172a" font-family="Arial,sans-serif" font-size="16" font-weight="800"><text x="488" y="60">1</text><text x="580" y="60">2</text><text x="36" y="126">3</text><text x="128" y="126">4</text><text x="220" y="126">5</text><text x="311" y="126">6</text><text x="402" y="126">7</text><text x="494" y="126">8</text><text x="584" y="126">9</text><text x="30" y="192">10</text><text x="122" y="192">11</text><text x="214" y="192">12</text><text x="306" y="192">13</text><text x="397" y="192">14</text><text x="489" y="192">15</text><text x="580" y="192">16</text></g>
      <circle cx="318" cy="122" r="15" fill="#c81e1e"/><text x="313" y="128" fill="#fff" font-family="Arial,sans-serif" font-size="14" font-weight="900">6</text>
    </g>
    <g transform="translate(700 110)">
      <rect width="278" height="430" rx="8" fill="#f8fafc" stroke="#d7dce4"/>
      <text x="24" y="38" fill="#0f172a" font-family="Arial,sans-serif" font-size="19" font-weight="900">Today</text>
      <text x="24" y="64" fill="#475569" font-family="Arial,sans-serif" font-size="16">0 active appointments</text>
      <rect x="24" y="88" width="230" height="46" rx="8" fill="#fff"/>
      <text x="38" y="118" fill="#475569" font-family="Arial,sans-serif" font-size="16">No active appointments today.</text>
      <line x1="24" x2="254" y1="160" y2="160" stroke="#e0e4ea"/>
      <text x="24" y="198" fill="#0f172a" font-family="Arial,sans-serif" font-size="19" font-weight="900">Next Up</text>
      <rect x="24" y="220" width="230" height="46" rx="8" fill="#fff"/>
      <text x="38" y="250" fill="#475569" font-family="Arial,sans-serif" font-size="16">No upcoming active appointments.</text>
