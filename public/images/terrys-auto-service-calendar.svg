<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Terry's Auto Service appointment calendar</title>
  <desc id="desc">Admin appointment calendar with May 2026 month view and appointment side panel.</desc>
  <rect width="1200" height="780" fill="#f5f6f8"/>
  <rect width="1200" height="72" fill="#050914"/>
  <text x="96" y="46" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="900">TERRY'S <tspan fill="#ef4444">AUTO</tspan> SERVICE</text>
  <g transform="translate(96 112)">
    <rect width="1008" height="604" rx="8" fill="#fff" stroke="#e0e4ea"/>
    <text x="30" y="48" fill="#0f172a" font-family="Arial,sans-serif" font-size="28" font-weight="900">Appointment Calendar</text>
    <text x="30" y="80" fill="#475569" font-family="Arial,sans-serif" font-size="18">Click any appointment to confirm, complete, reschedule, or cancel it.</text>
    <text x="760" y="58" fill="#0f172a" font-family="Arial,sans-serif" font-size="22" font-weight="900">May 2026</text>
    <g transform="translate(30 110)">
