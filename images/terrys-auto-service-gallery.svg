<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Terry's Auto Service gallery manager</title>
  <desc id="desc">Gallery admin page with Cloudinary upload form and recent shop work media card.</desc>
  <rect width="1200" height="780" fill="#f5f6f8"/>
  <rect width="1200" height="72" fill="#050914"/>
  <text x="96" y="46" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="900">TERRY'S <tspan fill="#ef4444">AUTO</tspan> SERVICE</text>
  <text x="96" y="132" fill="#0f172a" font-family="Arial,sans-serif" font-size="40" font-weight="900">Gallery</text>
  <text x="96" y="166" fill="#475569" font-family="Arial,sans-serif" font-size="19">Manage the photos and videos shown on Terry's homepage.</text>
  <rect x="890" y="104" width="132" height="50" rx="8" fill="#c81e1e"/><text x="926" y="136" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="900">Add Media</text>
  <g transform="translate(96 210)">
    <rect width="930" height="330" rx="8" fill="#fff" stroke="#e0e4ea"/>
    <text x="24" y="42" fill="#334155" font-family="Arial,sans-serif" font-size="16" font-weight="800">Title</text>
    <rect x="24" y="56" width="440" height="42" rx="7" fill="#fff" stroke="#cbd5e1"/>
    <text x="42" y="83" fill="#94a3b8" font-family="Arial,sans-serif" font-size="17" font-weight="700">Optional for batch uploads</text>
    <text x="24" y="130" fill="#334155" font-family="Arial,sans-serif" font-size="16" font-weight="800">Photos or Videos</text>
    <rect x="24" y="146" width="882" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="7 7"/>
    <text x="420" y="206" fill="#c81e1e" font-family="Arial,sans-serif" font-size="30" font-weight="900">Upload</text>
    <text x="360" y="236" fill="#0f172a" font-family="Arial,sans-serif" font-size="18" font-weight="900">Drop files here or click to choose</text>
    <rect x="748" y="286" width="80" height="42" rx="7" fill="#fff" stroke="#cbd5e1"/><text x="766" y="313" fill="#334155" font-family="Arial,sans-serif" font-size="16" font-weight="800">Cancel</text>
    <rect x="842" y="286" width="88" height="42" rx="7" fill="#c81e1e"/><text x="862" y="313" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="900">Save</text>
  </g>
  <g transform="translate(96 590)">
    <text x="0" y="0" fill="#0f172a" font-family="Arial,sans-serif" font-size="28" font-weight="900">Category</text>
    <text x="0" y="28" fill="#475569" font-family="Arial,sans-serif" font-size="17">1 media item</text>
    <rect y="52" width="250" height="110" rx="8" fill="#1f2937"/>
    <path d="M34 130l52-54 42 38 36-48 44 62" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect y="150" width="250" height="70" rx="8" fill="#fff" stroke="#e0e4ea"/>
    <text x="18" y="182" fill="#c81e1e" font-family="Arial,sans-serif" font-size="14" font-weight="900">AUTO SERVICE</text>
    <text x="18" y="208" fill="#0f172a" font-family="Arial,sans-serif" font-size="20" font-weight="900">Recent shop work</text>
  </g>
</svg>
