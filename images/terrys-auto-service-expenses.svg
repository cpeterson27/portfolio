<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Terry's Auto Service expenses</title>
  <desc id="desc">Business records and expenses dashboard with tax report, CSV download, totals, and expense table.</desc>
  <rect width="1200" height="780" fill="#f5f6f8"/>
  <rect width="1200" height="72" fill="#050914"/>
  <text x="96" y="46" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="900">TERRY'S <tspan fill="#ef4444">AUTO</tspan> SERVICE</text>
  <g transform="translate(96 112)">
    <rect width="1000" height="136" rx="8" fill="#050914"/>
    <text x="28" y="48" fill="#bfdbfe" font-family="Arial,sans-serif" font-size="18" font-weight="800">BUSINESS RECORDS</text>
    <text x="28" y="92" fill="#fff" font-family="Arial,sans-serif" font-size="38" font-weight="900">Expenses</text>
    <text x="28" y="122" fill="#d1d5db" font-family="Arial,sans-serif" font-size="18">Track shop costs and prepare clean records for Terry's tax professional.</text>
    <rect x="830" y="54" width="138" height="48" rx="8" fill="#c81e1e"/><text x="858" y="85" fill="#fff" font-family="Arial,sans-serif" font-size="18" font-weight="900">Add Expense</text>
  </g>
  <g transform="translate(96 284)" font-family="Arial,sans-serif">
    <rect width="170" height="48" rx="8" fill="#111827"/><text x="38" y="31" fill="#fff" font-size="17" font-weight="900">Open Tax Report</text>
    <rect x="190" width="230" height="48" rx="8" fill="#fff" stroke="#cbd5e1"/><text x="230" y="31" fill="#111827" font-size="17" font-weight="900">Download Spreadsheet CSV</text>
  </g>
  <g transform="translate(96 372)" font-family="Arial,sans-serif">
    <g fill="#fff" stroke="#e0e4ea"><rect width="296" height="104" rx="8"/><rect x="330" width="296" height="104" rx="8"/><rect x="660" width="296" height="104" rx="8"/></g>
    <g fill="#475569" font-size="17"><text x="24" y="38">This Month</text><text x="354" y="38">This Year</text><text x="684" y="38">Monthly Average</text></g>
    <g fill="#0f172a" font-size="38" font-weight="900"><text x="24" y="76">$53.00</text><text x="354" y="76">$53.00</text><text x="684" y="76">$10.60</text></g>
  </g>
  <g transform="translate(96 516)">
    <rect width="1000" height="142" rx="8" fill="#fff" stroke="#e0e4ea"/>
    <text x="24" y="44" fill="#0f172a" font-family="Arial,sans-serif" font-size="24" font-weight="900">All Expenses</text>
    <line y1="68" y2="68" x1="0" x2="1000" stroke="#e0e4ea"/>
    <g fill="#0f172a" font-family="Arial,sans-serif" font-size="16" font-weight="900"><text x="24" y="98">Description</text><text x="330" y="98">Category</text><text x="560" y="98">Amount</text><text x="760" y="98">Date</text></g>
    <g fill="#0f172a" font-family="Arial,sans-serif" font-size="17"><text x="24" y="128">Test</text><text x="330" y="128">Parts</text><text x="560" y="128">$53.00</text><text x="760" y="128">May 2, 2026</text></g>
  </g>
</svg>
