<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Cassandra Peterson CP icon</title>
  <desc id="desc">A minimal CP monogram inside a thin blue outlined dark square.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#02040A"/>
    </linearGradient>
    <linearGradient id="tileBg" x1="122" y1="102" x2="390" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10172A"/>
      <stop offset="100%" stop-color="#080D1B"/>
    </linearGradient>
    <linearGradient id="outline" x1="112" y1="92" x2="400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="letters" x1="166" y1="180" x2="346" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9CCBFF"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="outlineGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.376 0 0 0 0 0.647 0 0 0 0 0.980 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#pageBg)"/>
  <g filter="url(#outlineGlow)">
    <rect x="112" y="92" width="288" height="288" rx="58" fill="url(#tileBg)" stroke="url(#outline)" stroke-width="12"/>
  </g>
  <text
    x="256"
    y="265"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="122"
    font-weight="760"
    letter-spacing="0"
    fill="url(#letters)"
  >CP</text>
</svg>
