<!doctype html>
<html>
  <head>
    <title>Sparkle Bows Wireframes</title>
    <style>
      .wf {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 2rem 0;
        background: #f8fafc;
      }
      .wf-card {
        background: white;
        border: 0.5px solid #e2e8f0;
        border-radius: 12px;
        padding: 1.25rem;
      }
      .wf-screen {
        background: #f8fafc;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        overflow: hidden;
      }
      .wf-bar {
        height: 6px;
        border-radius: 3px;
        background: #cbd5e1;
      }
      .wf-box {
        background: #e2e8f0;
        border-radius: 4px;
      }
      .wf-pink {
        background: #fbb6ce;
        border-radius: 4px;
      }
      .wf-dark {
        background: #334155;
        border-radius: 4px;
      }
      .wf-label {
        font-size: 10px;
        color: #94a3b8;
        font-weight: 500;
        letter-spacing: 0.08em;
      }
      .section-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 12px;
      }
    </style>
  </head>
  <body>
    <div class="wf">
      <p
        style="
          font-size: 22px;
          font-weight: 500;
          color: #0f172a;
          margin: 0 0 4px;
        "
      >
        Wireframe mockups
      </p>
      <p style="font-size: 14px; color: #64748b; margin: 0 0 2rem">
        Homepage · product page · cart sidebar · mobile nav
      </p>

      <!-- Full original wireframes content here -->
      <div
        style="
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 20px;
          margin-bottom: 20px;
        "
      >
        <!-- Homepage desktop wireframe -->
        <!-- Product page wireframe -->
        <!-- etc. -->
      </div>
    </div>
  </body>
</html>
